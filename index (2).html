<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruto Hand Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: black; color: white; font-family: sans-serif; }
    #v_src { position: fixed; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #out { position: fixed; width: 100%; height: 100%; transform: scaleX(-1); z-index: 2; }
    .fx { position: absolute; width: 300px; z-index: 10; pointer-events: none; mix-blend-mode: screen; }
  </style>
</head>
<body>

  <video id="v_src" autoplay playsinline></video>
  <canvas id="out"></canvas>

  <video id="n" class="fx" src="https://framerusercontent.com/assets/B7m3jKOniK62J0XFkXl1jO0.mp4" muted autoplay loop playsinline></video>
  <video id="s" class="fx" src="https://framerusercontent.com/assets/2fUjN2O2p9gU2O1f.mp4" muted autoplay loop playsinline></video>

  <script>
    const v = document.getElementById('v_src');
    const c = document.getElementById('out');
    const ctx = c.getContext('2d');
    const n = document.getElementById('n');
    const s = document.getElementById('s');

    const hands = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((res) => {
      c.width = v.videoWidth; c.height = v.videoHeight;
      ctx.clearRect(0, 0, c.width, c.height);
      n.style.display = 'none'; s.style.display = 'none';

      if (res.multiHandLandmarks) {
        res.multiHandLandmarks.forEach((pts, i) => {
          const isRight = res.multiHandedness[i].label === 'Right';
          const vid = isRight ? s : n;
          const wrist = pts[0];
          
          vid.style.left = (wrist.x * window.innerWidth) + 'px';
          vid.style.top = (wrist.y * window.innerHeight) + 'px';
          vid.style.display = 'block';
        });
      }
    });

    const cam = new Camera(v, {
      onFrame: async () => { await hands.send({ image: v }); },
      width: 640, height: 480
    });
    cam.start();
  </script>
</body>
</html>
